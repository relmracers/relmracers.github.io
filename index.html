<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div class="header-brand">
      <img src="src/Logo.png" alt="Quidient Logo" class="logo">
      <a href="https://quidient.com/" target="_blank" rel="noopener" class="brand-link">
        <img src="src/Quidient_Header_LOGO.webp" alt="Quidient" class="header-logo-text">
      </a>
    </div>
    <h1>Leaderboard</h1>
    <p>Minigame — Live Scores</p>
  </header>

  <main>
    <div id="loading">
      <div class="spinner" aria-label="Loading scores"></div>
      <p>Loading scores...</p>
    </div>

    <div id="error" hidden>
      <p>Could not load scores.</p>
      <button type="button" id="retry-button">Retry</button>
    </div>

    <div id="empty" hidden>
      <p>No scores yet</p>
    </div>

    <div id="day-selector" role="group" aria-label="Day selector">
      <button type="button" id="day-prev" aria-label="Previous day">◄</button>
      <span id="day-label">Today</span>
      <button type="button" id="day-next" aria-label="Next day">►</button>
    </div>

    <div id="sort-controls" hidden>
      <button type="button" id="refresh-button" aria-label="Refresh scores">
        <img src="src/refresh-arrow.png" alt="" width="20" height="20">
      </button>
    </div>

    <table id="leaderboard-table" hidden>
      <thead>
        <tr>
          <th scope="col">Rank</th>
          <th scope="col">Player</th>
          <th scope="col" style="text-align: right;">Score</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>

    <button type="button" id="load-more" hidden aria-label="Load more scores">Load more</button>
  </main>

  <footer>
    <a href="https://quidient.com/" target="_blank" rel="noopener" class="footer-brand">
      <img src="src/Quidient-mini-logo-footer.png" alt="Quidient"> Quidient
    </a>
    <span> — Minigame</span>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, orderBy, limit, startAfter, Timestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBnSJyXgUVsq9RCXi-e2NSqUIapxXfrwPo",
      authDomain: "quidient-mobile-b411c.firebaseapp.com",
      projectId: "quidient-mobile-b411c",
      storageBucket: "quidient-mobile-b411c.firebasestorage.app",
      messagingSenderId: "1041850708115",
      appId: "1:1041850708115:web:800e087fe97741b7f85d66"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const TIMEOUT_MS = 8000;
    const MAX_ENTRIES = 50;

    let entries = [];
    let isLoading = false;
    let hasError = false;
    let allTimeStartRank = 1;

    // Day selector state
    const dayWindow = buildDayWindow();
    let selectedDayIndex = 0;
    let isAllTime = false;
    let lastDoc = null;
    let isLoadingMore = false;
    let hasMoreAllTime = false;

    const loadingEl = document.getElementById('loading');
    const errorEl = document.getElementById('error');
    const emptyEl = document.getElementById('empty');
    const sortControlsEl = document.getElementById('sort-controls');
    const tableEl = document.getElementById('leaderboard-table');
    const tbodyEl = document.getElementById('leaderboard-body');
    const retryButton = document.getElementById('retry-button');
    const dayPrevBtn = document.getElementById('day-prev');
    const dayNextBtn = document.getElementById('day-next');
    const dayLabelEl = document.getElementById('day-label');
    const loadMoreBtn = document.getElementById('load-more');

    function setLoading(loading) {
      isLoading = loading;
      loadingEl.hidden = !loading;
      if (loading) {
        errorEl.hidden = true;
        emptyEl.hidden = true;
        sortControlsEl.hidden = true;
        tableEl.hidden = true;
      }
      updateDaySelector();
    }

    function setError(error) {
      hasError = error;
      errorEl.hidden = !error;
    }

    function getRankContent(rank) {
      if (rank === 1) return rank + '<span class="medal" aria-hidden="true">🥇</span>';
      if (rank === 2) return rank + '<span class="medal" aria-hidden="true">🥈</span>';
      if (rank === 3) return rank + '<span class="medal" aria-hidden="true">🥉</span>';
      return String(rank);
    }

    function render() {
      tbodyEl.innerHTML = '';

      if (entries.length === 0) {
        emptyEl.hidden = false;
        sortControlsEl.hidden = true;
        tableEl.hidden = true;
        return;
      }

      emptyEl.hidden = true;
      sortControlsEl.hidden = false;
      tableEl.hidden = false;

      entries.forEach(function (entry, index) {
        const rank = allTimeStartRank + index;
        const row = document.createElement('tr');

        const rankCell = document.createElement('td');
        rankCell.className = 'rank';
        rankCell.setAttribute('data-label', 'Rank');
        rankCell.innerHTML = getRankContent(rank);

        const nameCell = document.createElement('td');
        nameCell.setAttribute('data-label', 'Player');
        nameCell.textContent = entry.name;

        const scoreCell = document.createElement('td');
        scoreCell.className = 'score';
        scoreCell.setAttribute('data-label', 'Score');
        scoreCell.textContent = entry.score.toLocaleString();

        row.appendChild(rankCell);
        row.appendChild(nameCell);
        row.appendChild(scoreCell);
        tbodyEl.appendChild(row);
      });
    }

    // --- Day selector ---

    /**
     * Format a UTC instant as { y, m, d } in America/Los_Angeles.
     * @param {Date} date
     * @returns {{ y: number, m: number, d: number }}
     */
    function formatPtYmd(date) {
      const parts = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Los_Angeles',
        year: 'numeric', month: '2-digit', day: '2-digit'
      }).formatToParts(date);
      return {
        y: parseInt(parts.find(p => p.type === 'year').value, 10),
        m: parseInt(parts.find(p => p.type === 'month').value, 10),
        d: parseInt(parts.find(p => p.type === 'day').value, 10)
      };
    }

    /**
     * Return the UTC instant of 00:00:00 America/Los_Angeles on the given PT calendar day.
     * DST-safe: the offset is discovered for the target date, not hardcoded.
     * @param {number} ptYear  4-digit year in PT
     * @param {number} ptMonth 1-12 month in PT
     * @param {number} ptDay   1-31 day-of-month in PT
     * @returns {Date} UTC instant
     */
    function ptMidnightUtc(ptYear, ptMonth, ptDay) {
      const candidates = [
        new Date(Date.UTC(ptYear, ptMonth - 1, ptDay) + 7 * 3600 * 1000), // PDT first
        new Date(Date.UTC(ptYear, ptMonth - 1, ptDay) + 8 * 3600 * 1000)  // PST second
      ];
      const fmt = new Intl.DateTimeFormat('en-CA', {
        timeZone: 'America/Los_Angeles',
        year: 'numeric', month: '2-digit', day: '2-digit'
      });
      for (const candidate of candidates) {
        const parts = fmt.formatToParts(candidate);
        const y = parseInt(parts.find(p => p.type === 'year').value, 10);
        const m = parseInt(parts.find(p => p.type === 'month').value, 10);
        const d = parseInt(parts.find(p => p.type === 'day').value, 10);
        if (y === ptYear && m === ptMonth && d === ptDay) return candidate;
      }
      throw new Error('ptMidnightUtc: no candidate matched ' + ptYear + '-' + ptMonth + '-' + ptDay);
    }

    function buildDayWindow() {
      const days = [];
      const today = formatPtYmd(new Date());
      for (let i = 0; i < 7; i++) {
        const approxUtc = new Date(Date.UTC(today.y, today.m - 1, today.d - i + 1));
        const target = formatPtYmd(approxUtc);
        days.push(ptMidnightUtc(target.y, target.m, target.d));
      }
      return days;
    }

    function nextDayStart(date) {
      const today = formatPtYmd(date);
      const approxUtc = new Date(Date.UTC(today.y, today.m - 1, today.d + 2));
      const target = formatPtYmd(approxUtc);
      return ptMidnightUtc(target.y, target.m, target.d);
    }

    function getDayLabel(date) {
      if (date.getTime() === dayWindow[0].getTime()) return 'Today';
      if (date.getTime() === dayWindow[1].getTime()) return 'Yesterday';
      return new Intl.DateTimeFormat('en-US', {
        timeZone: 'America/Los_Angeles',
        month: 'short', day: 'numeric'
      }).format(date);
    }

    function updateDaySelector() {
      if (isAllTime) {
        dayLabelEl.textContent = 'All Time';
        dayPrevBtn.disabled = isLoading;
        dayPrevBtn.textContent = '◄';
        dayPrevBtn.setAttribute('aria-label', 'Back to today');
        dayNextBtn.disabled = true;
        dayNextBtn.textContent = '';
        dayNextBtn.setAttribute('aria-label', '');
      } else if (selectedDayIndex === 0) {
        dayLabelEl.textContent = 'Today';
        dayPrevBtn.disabled = isLoading;
        dayPrevBtn.textContent = '◄';
        dayPrevBtn.setAttribute('aria-label', 'Previous day');
        dayNextBtn.disabled = isLoading;
        dayNextBtn.textContent = 'All Time';
        dayNextBtn.setAttribute('aria-label', 'Show all time leaderboard');
      } else {
        dayLabelEl.textContent = getDayLabel(dayWindow[selectedDayIndex]);
        dayPrevBtn.disabled = isLoading || selectedDayIndex >= 6;
        dayPrevBtn.textContent = '◄';
        dayPrevBtn.setAttribute('aria-label', 'Previous day');
        dayNextBtn.disabled = isLoading;
        dayNextBtn.textContent = '►';
        dayNextBtn.setAttribute('aria-label', 'Next day');
      }
    }

    function fetchForSelectedDay() {
      const start = dayWindow[selectedDayIndex];
      fetchLeaderboard(start, nextDayStart(start));
    }

    dayPrevBtn.addEventListener('click', function() {
      if (isAllTime) {
        isAllTime = false;
        lastDoc = null;
        selectedDayIndex = 0;
        updateDaySelector();
        fetchForSelectedDay();
      } else if (selectedDayIndex < 6) {
        selectedDayIndex++;
        updateDaySelector();
        fetchForSelectedDay();
      }
    });

    dayNextBtn.addEventListener('click', function() {
      if (isAllTime) return;
      if (selectedDayIndex === 0) {
        isAllTime = true;
        lastDoc = null;
        entries = [];
        updateDaySelector();
        fetchAllTimePage(true);
      } else {
        selectedDayIndex--;
        updateDaySelector();
        fetchForSelectedDay();
      }
    });

    document.addEventListener('keydown', function(e) {
      if (e.target !== document.body && !e.target.closest('#day-selector')) return;
      if (e.key === 'ArrowLeft') { e.preventDefault(); dayPrevBtn.click(); }
      if (e.key === 'ArrowRight') { e.preventDefault(); dayNextBtn.click(); }
    });

    function withTimeout(promise, ms) {
      return new Promise(function (resolve, reject) {
        const timer = setTimeout(function () {
          reject(new Error('Request timed out after ' + ms + 'ms'));
        }, ms);
        promise.then(
          function (value) { clearTimeout(timer); resolve(value); },
          function (err) { clearTimeout(timer); reject(err); }
        );
      });
    }

    async function fetchLeaderboard(dayStart, dayEnd) {
      if (isLoading) return;
      allTimeStartRank = 1;
      setLoading(true);
      setError(false);

      try {
        const startTs = Timestamp.fromDate(dayStart);
        const endTs = Timestamp.fromDate(dayEnd);

        const leaderboardQuery = query(
          collection(db, "leaderboard"),
          where("score", ">", 0),
          where("createdAt", ">=", startTs),
          where("createdAt", "<", endTs),
          orderBy("createdAt", "desc"),
          orderBy("name", "asc"),
          limit(MAX_ENTRIES)
        );
        const querySnapshot = await withTimeout(getDocs(leaderboardQuery), TIMEOUT_MS);

        entries = [];
        querySnapshot.forEach(function (doc) {
          const data = doc.data();
          const rawName = typeof data.name === 'string' ? data.name.trim() : '';
          entries.push({
            name: rawName || 'Anonymous',
            score: Number(data.score) || 0
          });
        });

        entries.sort(function (a, b) {
          if (b.score !== a.score) return b.score - a.score;
          return a.name.localeCompare(b.name);
        });

        loadMoreBtn.hidden = true;
        render();
      } catch (err) {
        console.error('Leaderboard fetch failed:', err);
        entries = [];
        setError(true);
      } finally {
        setLoading(false);
      }
    }

    async function fetchAllTimePage(reset) {
      if (reset) {
        setLoading(true);
        setError(false);
        lastDoc = null;
        entries = [];
        loadMoreBtn.hidden = true;
      } else {
        isLoadingMore = true;
        loadMoreBtn.disabled = true;
        loadMoreBtn.textContent = 'Loading...';
      }

      // Rank offset for the first row of this page: number of entries already loaded
      // before pushing the new page. After pushing, rank is offset + index.
      const rankOffset = reset ? 0 : entries.length;

      try {
        const constraints = [
          collection(db, "leaderboard"),
          where("score", ">", 0),
          orderBy("score", "desc"),
          orderBy("name", "asc"),
          limit(MAX_ENTRIES)
        ];

        if (lastDoc) {
          constraints.push(startAfter(lastDoc));
        }

        const allTimeQuery = query(...constraints);
        const querySnapshot = await withTimeout(getDocs(allTimeQuery), TIMEOUT_MS);

        querySnapshot.forEach(function(doc) {
          const data = doc.data();
          const rawName = typeof data.name === 'string' ? data.name.trim() : '';
          entries.push({
            name: rawName || 'Anonymous',
            score: Number(data.score) || 0
          });
        });

        const docs = querySnapshot.docs;
        if (docs.length > 0) {
          lastDoc = docs[docs.length - 1];
        }

        // Only offer "Load more" if the page was full (i.e. there might be more).
        hasMoreAllTime = docs.length === MAX_ENTRIES;
        allTimeStartRank = rankOffset + 1;

        loadMoreBtn.hidden = !hasMoreAllTime;
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = 'Load more';

        render();
      } catch (err) {
        console.error('All Time fetch failed:', err);
        if (reset) {
          entries = [];
          allTimeStartRank = 1;
          setError(true);
        }
        loadMoreBtn.hidden = true;
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = 'Load more';
      } finally {
        isLoadingMore = false;
        if (reset) {
          setLoading(false);
        }
      }
    }

    loadMoreBtn.addEventListener('click', function() {
      if (!isLoadingMore && hasMoreAllTime) {
        fetchAllTimePage(false);
      }
    });

    retryButton.addEventListener('click', function() {
      if (isAllTime) {
        fetchAllTimePage(entries.length === 0);
      } else {
        fetchForSelectedDay();
      }
    });
    document.getElementById('refresh-button').addEventListener('click', function() {
      if (isAllTime) {
        fetchAllTimePage(true);
      } else {
        fetchForSelectedDay();
      }
    });

    updateDaySelector();
    fetchForSelectedDay();
  </script>
</body>
</html>
